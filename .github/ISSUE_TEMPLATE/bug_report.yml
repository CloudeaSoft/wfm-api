name: Bug report
description: Report a problem with wfm-api
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: A clear summary of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code that triggers the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions that matter for reproducing the bug.
      value: |
        - wfm-api:
        - Node.js:
        - Package manager (pnpm/npm/yarn):
        - OS:
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, links, or anything else that might help.
    validations:
      required: false
